<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillnet // agent-almanac</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────── -->
  <header class="header">
    <span class="header-title">Skillnet</span>

    <button id="hamburger-toggle" class="hamburger-toggle" data-i18n-aria="a11y.menu" aria-label="Menu" aria-expanded="false">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

    <div class="header-stats">
      <span><span class="stat-value" id="stat-skills">0</span> <span data-i18n="header.skills">skills</span></span>
      <span><span class="stat-value" id="stat-edges">0</span> <span data-i18n="header.edges">edges</span></span>
      <span><span class="stat-value" id="stat-domains">0</span> <span data-i18n="header.domains">domains</span></span>
      <span><span class="stat-value" id="stat-agents">0</span> <span data-i18n="header.agents">agents</span></span>
      <span><span class="stat-value" id="stat-teams">0</span> <span data-i18n="header.teams">teams</span></span>
    </div>

    <div class="header-drawer" id="header-drawer">
    <div class="header-controls">
      <select id="locale-select" data-i18n-title="controls.language" title="Language"></select>
      <select id="theme-select" data-i18n-title="controls.colorTheme" title="Color Theme">
        <option value="cyberpunk">Cyberpunk</option>
        <option value="viridis">Viridis</option>
        <option value="inferno">Inferno</option>
        <option value="magma">Magma</option>
        <option value="plasma">Plasma</option>
        <option value="cividis">Cividis</option>
        <option value="mako">Mako</option>
        <option value="rocket">Rocket</option>
        <option value="turbo">Turbo</option>
      </select>
      <button id="btn-icon-toggle" data-i18n-title="controls.toggleIcons" title="Toggle Icons" data-i18n="controls.icons">Icons</button>
      <button id="btn-hd-toggle" data-i18n-title="controls.toggleHd" title="Toggle High-Resolution Icons" style="display:none" data-i18n="controls.hd">HD</button>
      <button id="btn-zoom-in" data-i18n-title="controls.zoomIn" title="Zoom In">+</button>
      <button id="btn-zoom-out" data-i18n-title="controls.zoomOut" title="Zoom Out">&minus;</button>
      <button id="btn-reset" data-i18n-title="controls.resetView" title="Reset View" data-i18n="controls.reset">Reset</button>
      <div class="mode-buttons" role="tablist" data-i18n-aria="controls.vizMode" aria-label="Visualization mode">
        <button id="btn-2d" class="active" role="tab" aria-selected="true" data-i18n-title="controls.mode2d" title="2D Force Layout">2D</button>
        <button id="btn-3d" role="tab" aria-selected="false" data-i18n-title="controls.mode3d" title="3D Force Layout">3D</button>
        <button id="btn-hive" role="tab" aria-selected="false" data-i18n-title="controls.modeHive" title="Hive Plot">Hive</button>
        <button id="btn-chord" role="tab" aria-selected="false" data-i18n-title="controls.modeChord" title="Chord Diagram">Chord</button>
        <button id="btn-flow" role="tab" aria-selected="false" data-i18n-title="controls.modeFlow" title="Workflow Diagram">Flow</button>
      </div>
      <select id="hive-domain-focus" data-i18n-title="controls.hiveDomainFocus" title="Focus on Domain" style="display:none">
        <option value="" data-i18n="controls.hiveAllDomains">All Domains</option>
      </select>
      <button id="btn-hive-sort" data-i18n-title="controls.hiveSortToggle" title="Toggle Hive Sort Mode" style="display:none" data-i18n="controls.hiveSortSpread">Spread</button>
      <label id="hive-spread-label" class="hive-control" style="display:none" data-i18n-title="controls.hiveTrackSpread" title="Track Spread">
        <input type="range" id="hive-spread" min="0.5" max="5" step="0.1" value="3">
      </label>
      <label id="sprite-label-3d" class="hive-control" style="display:none" data-i18n-title="controls.spriteSize3d" title="3D Icon Size">
        <input type="range" id="sprite-scale-3d" min="0.5" max="3" step="0.1" value="1">
      </label>
      <button id="btn-event-log" data-i18n-title="controls.downloadEventLog" title="Download Event Log" style="display:none" data-i18n="controls.log">Log</button>
    </div>
    </div>
  </header>

  <!-- ── Panel Toggle (Left edge) ──────────────────────────────── -->
  <button id="panel-toggle" class="panel-toggle" data-i18n-aria="filter.togglePanel" aria-label="Toggle filter panel" aria-expanded="true" aria-controls="filter-panel">
    <span class="panel-toggle-icon" aria-hidden="true">&#x25C0;</span>
  </button>

  <!-- ── Filter Panel (Left) ───────────────────────────────────── -->
  <aside id="filter-panel" class="filter-panel">

    <!-- ── Skills Section ──────────────────────────────────────── -->
    <div class="filter-section" data-section="skills">
      <div class="filter-section-header" role="button" tabindex="0" aria-expanded="true" aria-controls="skills-section-body">
        <span class="filter-section-chevron" aria-hidden="true">&#x25BE;</span>
        <h3 data-i18n="filter.skills">Skills</h3>
        <span class="filter-section-count" id="skills-section-count" aria-live="polite">0</span>
        <div class="filter-bulk" role="group" data-i18n-aria="filter.bulkSkills" aria-label="Bulk actions for Skills">
          <button class="filter-all" data-target="skills" data-i18n-aria="filter.selectAllSkills" aria-label="Select all skills" data-i18n="filter.all">All</button>
          <button class="filter-none" data-target="skills" data-i18n-aria="filter.deselectAllSkills" aria-label="Deselect all skills" data-i18n="filter.none">None</button>
        </div>
      </div>
      <div id="skills-section-body" class="filter-section-body open">
        <div class="filter-list" id="skills-filter-list"></div>
      </div>
    </div>

    <!-- ── Agents Section ──────────────────────────────────────── -->
    <div class="filter-section" data-section="agents">
      <div class="filter-section-header" role="button" tabindex="0" aria-expanded="true" aria-controls="agents-section-body">
        <span class="filter-section-chevron" aria-hidden="true">&#x25BE;</span>
        <h3 data-i18n="filter.agents">Agents</h3>
        <span class="filter-section-count" id="agents-section-count" aria-live="polite">0</span>
        <div class="filter-bulk" role="group" data-i18n-aria="filter.bulkAgents" aria-label="Bulk actions for Agents">
          <button class="filter-all" data-target="agents" data-i18n-aria="filter.selectAllAgents" aria-label="Select all agents" data-i18n="filter.all">All</button>
          <button class="filter-none" data-target="agents" data-i18n-aria="filter.deselectAllAgents" aria-label="Deselect all agents" data-i18n="filter.none">None</button>
        </div>
      </div>
      <div id="agents-section-body" class="filter-section-body open">
        <div class="filter-list" id="agents-filter-list"></div>
      </div>
    </div>

    <!-- ── Teams Section ──────────────────────────────────────── -->
    <div class="filter-section" data-section="teams">
      <div class="filter-section-header" role="button" tabindex="0" aria-expanded="true" aria-controls="teams-section-body">
        <span class="filter-section-chevron" aria-hidden="true">&#x25BE;</span>
        <h3 data-i18n="filter.teams">Teams</h3>
        <span class="filter-section-count" id="teams-section-count" aria-live="polite">0</span>
        <div class="filter-bulk" role="group" data-i18n-aria="filter.bulkTeams" aria-label="Bulk actions for Teams">
          <button class="filter-all" data-target="teams" data-i18n-aria="filter.selectAllTeams" aria-label="Select all teams" data-i18n="filter.all">All</button>
          <button class="filter-none" data-target="teams" data-i18n-aria="filter.deselectAllTeams" aria-label="Deselect all teams" data-i18n="filter.none">None</button>
        </div>
      </div>
      <div id="teams-section-body" class="filter-section-body open">
        <div class="filter-list" id="teams-filter-list"></div>
      </div>
    </div>

    <!-- ── Tags Section ──────────────────────────────────────── -->
    <div class="filter-section" data-section="tags">
      <div class="filter-section-header" role="button" tabindex="0"
           aria-expanded="false" aria-controls="tags-section-body">
        <span class="filter-section-chevron" aria-hidden="true">&#x25BE;</span>
        <h3 data-i18n="filter.tags">Tags</h3>
        <span class="filter-section-count" id="tags-section-count"
              aria-live="polite">0 selected</span>
        <div class="filter-bulk" role="group" data-i18n-aria="filter.bulkTags" aria-label="Bulk actions for Tags">
          <button class="filter-none" data-target="tags"
                  data-i18n-aria="filter.clearAllTags" aria-label="Clear all tags" data-i18n="filter.clear">Clear</button>
        </div>
      </div>
      <div id="tags-section-body" class="filter-section-body">
        <div id="tags-filter-list"></div>
      </div>
    </div>

  </aside>

  <!-- ── Graph Canvas ──────────────────────────────────────────── -->
  <div id="graph-container" role="application" data-i18n-aria="a11y.graphContainer" aria-label="Interactive skill network visualization" tabindex="0"></div>

  <!-- ── Detail Panel (Right) ──────────────────────────────────── -->
  <aside id="detail-panel" class="detail-panel">
    <div class="panel-top-bar">
      <div class="drag-handle"><span></span></div>
      <button class="panel-close">&times;</button>
    </div>
    <div class="panel-content"></div>
  </aside>

  <!-- ── Tooltip ───────────────────────────────────────────────── -->
  <div id="tooltip" class="tooltip"></div>

  <!-- ── App (ES modules) ──────────────────────────────────────── -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
