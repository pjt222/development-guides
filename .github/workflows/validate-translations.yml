name: Validate Translations
on:
  push:
    branches: [main]
    paths: ['i18n/**']
  pull_request:
    paths: ['i18n/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate translated skill frontmatter
        run: |
          failed=0
          for locale_dir in i18n/*/skills/; do
            [ ! -d "$locale_dir" ] && continue
            locale=$(basename "$(dirname "$locale_dir")")
            for dir in "$locale_dir"/*/; do
              [ ! -f "$dir/SKILL.md" ] && continue
              # Check locale field
              if ! grep -q "locale: $locale" "$dir/SKILL.md"; then
                echo "FAIL: $dir/SKILL.md missing locale: $locale"
                failed=1
              fi
              # Check source_commit field
              if ! grep -q "source_commit:" "$dir/SKILL.md"; then
                echo "FAIL: $dir/SKILL.md missing source_commit"
                failed=1
              fi
              # Check line count
              lines=$(wc -l < "$dir/SKILL.md")
              if [ "$lines" -gt 500 ]; then
                echo "FAIL: $dir/SKILL.md ($lines > 500)"
                failed=1
              fi
            done
          done
          exit $failed

      - name: Validate translated agent/team/guide frontmatter
        run: |
          failed=0
          for content_type in agents teams guides; do
            for locale_dir in i18n/*/"$content_type"/; do
              [ ! -d "$locale_dir" ] && continue
              locale=$(basename "$(dirname "$locale_dir")")
              for file in "$locale_dir"*.md; do
                [ ! -f "$file" ] && continue
                if ! grep -q "locale: $locale" "$file"; then
                  echo "FAIL: $file missing locale: $locale"
                  failed=1
                fi
                if ! grep -q "source_commit:" "$file"; then
                  echo "FAIL: $file missing source_commit"
                  failed=1
                fi
              done
            done
          done
          exit $failed

      - name: Check for orphan translations
        run: |
          warn=0
          for content_type in skills agents teams guides; do
            for locale_dir in i18n/*/"$content_type"/; do
              [ ! -d "$locale_dir" ] && continue
              locale=$(basename "$(dirname "$locale_dir")")
              if [ "$content_type" = "skills" ]; then
                for skill_dir in "$locale_dir"*/; do
                  [ ! -d "$skill_dir" ] && continue
                  skill_name=$(basename "$skill_dir")
                  if [ ! -f "skills/${skill_name}/SKILL.md" ]; then
                    echo "WARN: orphan translation i18n/$locale/skills/$skill_name"
                    warn=$((warn + 1))
                  fi
                done
              else
                for item in "$locale_dir"*.md; do
                  [ ! -f "$item" ] && continue
                  item_name=$(basename "$item")
                  if [ ! -f "$content_type/$item_name" ]; then
                    echo "WARN: orphan translation i18n/$locale/$content_type/$item_name"
                    warn=$((warn + 1))
                  fi
                done
              fi
            done
          done
          [ "$warn" -gt 0 ] && echo "WARN: $warn orphan translation(s) found"
          # Orphans are warnings, not failures
          exit 0

      - name: Check translation freshness
        run: node scripts/check-translation-freshness.js --warn
